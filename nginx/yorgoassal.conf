# ──────────────────────────────────────────────────────────────────────────────
# Nginx configuration for yorgoassal.com
# ──────────────────────────────────────────────────────────────────────────────
#
# DEPLOYMENT INSTRUCTIONS:
#   1. Copy this file to your EC2 instance:
#      scp nginx/yorgoassal.conf ec2-user@<your-ec2-ip>:/tmp/
#
#   2. Move it to the Nginx config directory:
#      sudo mv /tmp/yorgoassal.conf /etc/nginx/conf.d/yorgoassal.conf
#
#   3. Obtain an SSL certificate via Certbot (free, Let's Encrypt):
#      sudo certbot --nginx -d yorgoassal.com -d www.yorgoassal.com
#      Certbot will automatically update this file with SSL config.
#
#   4. Test and reload:
#      sudo nginx -t && sudo systemctl reload nginx
#
# ──────────────────────────────────────────────────────────────────────────────


# ── Redirect HTTP → HTTPS ──────────────────────────────────────────────────────
# All plain HTTP traffic is permanently redirected to HTTPS.
# Certbot fills this in automatically — shown here for clarity.
server {
    listen 80;
    listen [::]:80;
    server_name yorgoassal.com www.yorgoassal.com;

    # Allow Let's Encrypt ACME challenge for certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}


# ── Main HTTPS server ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name yorgoassal.com www.yorgoassal.com;

    # ── SSL certificates (managed by Certbot) ──────────────────────────
    # These paths are set automatically by certbot --nginx
    ssl_certificate     /etc/letsencrypt/live/yorgoassal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yorgoassal.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Gzip compression ────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied    expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Logging ─────────────────────────────────────────────────────────
    access_log /var/log/nginx/yorgoassal.access.log;
    error_log  /var/log/nginx/yorgoassal.error.log;


    # ────────────────────────────────────────────────────────────────────
    # YORTECH — /yortech/*
    # ────────────────────────────────────────────────────────────────────

    # YorTech API — proxy to Node.js Express server on port 3001
    # The /yortech/api prefix is stripped before forwarding.
    location /yortech/api/ {
        proxy_pass         http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout settings — generous for the Claude Batch API polling
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
        proxy_connect_timeout 10s;
    }

    # Health check endpoint — used by CloudWatch monitoring
    location /yortech/health {
        proxy_pass         http://127.0.0.1:3001/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;   # don't pollute logs with health checks
    }

    # YorTech static React frontend — served directly from S3/dist
    # Nginx serves the built React files without touching Node.js
    location /yortech/ {
        alias /home/ec2-user/yortech/client/dist/;

        # Try the exact file first, then index.html for React Router
        # This ensures /yortech/archive loads the React app, not a 404
        try_files $uri $uri/ /yortech/index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }


    # ────────────────────────────────────────────────────────────────────
    # PORTFOLIO — / (root)
    # ────────────────────────────────────────────────────────────────────

    # Serve the static portfolio placeholder
    # Replace this block later when the full portfolio is built
    location / {
        root  /home/ec2-user/yortech/portfolio;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Light caching for the portfolio (24h)
        expires 1d;
        add_header Cache-Control "public";
    }


    # ────────────────────────────────────────────────────────────────────
    # GENERAL
    # ────────────────────────────────────────────────────────────────────

    # Block common exploit scanners
    location ~ /\.(git|env|htaccess) {
        deny all;
        return 404;
    }

    # Limit request body size (protects against large payload attacks)
    client_max_body_size 1m;
}
