<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── SEO ─────────────────────────────────────────────────────────── -->
    <title>YorTech — Daily Tech & Science Briefing</title>
    <meta
      name="description"
      content="YorTech is a daily tech and science newspaper curated for computer engineering students. AI, dev tools, research, and market trends — every weekday."
    />
    <meta name="author" content="Yorgo Assal" />

    <!-- ── Open Graph (for link previews on LinkedIn, etc.) ────────────── -->
    <meta property="og:title"       content="YorTech — Daily Tech & Science Briefing" />
    <meta property="og:description" content="Daily AI, developer tools, ML research and market news — curated for engineers." />
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://yorgoassal.com/yortech" />

    <!-- ── Fonts ───────────────────────────────────────────────────────── -->
    <!-- Share Tech Mono  → headlines and terminal-style text             -->
    <!-- JetBrains Mono   → body text and code                           -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&display=swap"
      rel="stylesheet"
    />

    <!-- ── Favicon placeholder ─────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/yortech/favicon.svg" />
  </head>
  <body>
    <!-- React mounts here -->
    <div id="root"></div>

    <!-- Vite injects the compiled JS bundle here at build time -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
